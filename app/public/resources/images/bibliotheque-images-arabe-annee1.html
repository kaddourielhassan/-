<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bibliothèque d'images — Arabe Année 1</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #1D9E75; --teal-light: #9FE1CB; --teal-pale: #E1F5EE;
    --gold: #BA7517; --gold-light: #FAC775; --gold-pale: #FAEEDA;
    --coral: #993C1D; --coral-light: #F0997B; --coral-pale: #FAECE7;
    --blue: #185FA5; --blue-light: #85B7EB; --blue-pale: #E6F1FB;
    --purple: #534AB7; --purple-light: #AFA9EC; --purple-pale: #EEEDFE;
    --gray: #5F5E5A; --gray-light: #D3D1C7; --gray-pale: #F1EFE8;
    --text: #2C2C2A; --text-mid: #5F5E5A; --text-light: #888780;
    --bg: #FDFCF8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  .hero {
    background: linear-gradient(135deg, #0a2e24 0%, #1D9E75 60%, #9FE1CB 100%);
    padding: 48px 32px 36px;
    position: relative; overflow: hidden;
  }
  .hero::before {
    content: 'أ ب ت ث ج ح خ د ذ ر ز س ش ص ض ط ظ ع غ ف ق ك ل م ن ه و ي';
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    font-family: 'Amiri', serif; font-size: 28px;
    color: rgba(255,255,255,0.06); line-height: 1.8;
    word-break: break-all; padding: 8px;
    pointer-events: none; letter-spacing: 12px;
  }
  .hero-inner { max-width: 960px; margin: 0 auto; position: relative; z-index: 1; }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25);
    padding: 5px 14px; border-radius: 999px;
    font-size: 12px; color: rgba(255,255,255,0.9); font-weight: 600;
    letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 16px;
  }
  .hero h1 { font-size: 36px; font-weight: 800; color: white; line-height: 1.1; margin-bottom: 6px; }
  .hero-ar { font-family: 'Amiri', serif; font-size: 22px; color: rgba(255,255,255,0.75); direction: rtl; margin-bottom: 12px; }
  .hero-sub { font-size: 15px; color: rgba(255,255,255,0.7); font-weight: 400; }
  .hero-stats { display: flex; flex-wrap: wrap; gap: 24px; margin-top: 24px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.15); }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-n { font-size: 22px; font-weight: 800; color: var(--gold-light); }
  .stat-l { font-size: 11px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.5px; }

  /* TABS */
  .tabs-wrap { background: white; border-bottom: 1.5px solid var(--gray-pale); position: sticky; top: 0; z-index: 50; }
  .tabs { max-width: 960px; margin: 0 auto; padding: 0 16px; display: flex; gap: 2px; overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 14px 16px; border: none; background: none; cursor: pointer;
    font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700;
    color: var(--text-light); white-space: nowrap;
    border-bottom: 3px solid transparent; margin-bottom: -1.5px;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--teal); border-bottom-color: var(--teal); }

  /* MAIN */
  .main { max-width: 960px; margin: 0 auto; padding: 32px 20px 60px; }
  .section { display: none; }
  .section.active { display: block; }
  .section-head { margin-bottom: 24px; }
  .section-head h2 { font-size: 22px; font-weight: 800; color: var(--text); }
  .section-head p { font-size: 14px; color: var(--text-mid); margin-top: 4px; }

  /* GRID */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 14px; }

  /* CARD */
  .card {
    background: white; border: 1.5px solid var(--gray-pale);
    border-radius: 16px; padding: 16px 10px 12px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    cursor: pointer; transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    user-select: none;
  }
  .card:hover { transform: translateY(-3px); border-color: var(--teal-light); box-shadow: 0 6px 20px rgba(29,158,117,0.1); }
  .card:active { transform: translateY(0); }
  .card svg { width: 80px; height: 80px; }
  .card-fr { font-size: 13px; font-weight: 700; color: var(--text); text-align: center; line-height: 1.3; }
  .card-ar { font-family: 'Amiri', serif; font-size: 18px; color: var(--teal); direction: rtl; line-height: 1.2; }
  .card-ph { font-size: 10px; color: var(--text-light); font-style: italic; text-align: center; }

  /* MODAL */
  .modal-bg {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45); z-index: 200;
    align-items: center; justify-content: center; padding: 20px;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: white; border-radius: 24px; padding: 36px 32px;
    max-width: 320px; width: 100%; text-align: center;
    position: relative; animation: popIn 0.2s ease;
  }
  @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal-close {
    position: absolute; top: 14px; right: 16px;
    border: none; background: var(--gray-pale); color: var(--text-mid);
    width: 30px; height: 30px; border-radius: 50%;
    font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .modal svg { width: 130px; height: 130px; }
  .modal-fr { font-size: 22px; font-weight: 800; color: var(--text); margin-top: 14px; }
  .modal-ar { font-family: 'Amiri', serif; font-size: 32px; color: var(--teal); direction: rtl; margin-top: 4px; line-height: 1.3; }
  .modal-ph { font-size: 14px; color: var(--text-light); font-style: italic; margin-top: 4px; }
  .modal-theme { display: inline-block; margin-top: 14px; padding: 4px 14px; border-radius: 999px; font-size: 12px; font-weight: 700; background: var(--teal-pale); color: var(--teal); }
  .modal-nav { display: flex; gap: 10px; justify-content: center; margin-top: 18px; }
  .modal-nav button {
    border: 1.5px solid var(--gray-light); background: white; border-radius: 10px;
    padding: 8px 18px; font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700;
    color: var(--text-mid); cursor: pointer; transition: background 0.1s;
  }
  .modal-nav button:hover { background: var(--teal-pale); border-color: var(--teal); color: var(--teal); }

  /* PRINT */
  @media print {
    .tabs-wrap, .modal-bg { display: none !important; }
    .section { display: block !important; page-break-after: always; }
    .hero { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-inner">
    <div class="hero-badge">📚 Cycle 1 · Éveil · 6-8 ans</div>
    <h1>Bibliothèque d'images<br>Arabe — Année 1</h1>
    <div class="hero-ar">مَكْتَبَةُ الصُّوَر — السَّنَةُ الأُولَى</div>
    <div class="hero-sub">Référentiel pré-A1 · Immersion sonore et découverte graphique</div>
    <div class="hero-stats">
      <div class="stat"><span class="stat-n">11</span><span class="stat-l">Thèmes</span></div>
      <div class="stat"><span class="stat-n">76</span><span class="stat-l">Images</span></div>
      <div class="stat"><span class="stat-n">≈100</span><span class="stat-l">Mots actifs</span></div>
      <div class="stat"><span class="stat-n">pré-A1</span><span class="stat-l">Niveau visé</span></div>
    </div>
  </div>
</div>

<div class="tabs-wrap">
  <div class="tabs" id="tabs"></div>
</div>

<div class="main" id="main"></div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-svg"></div>
    <div class="modal-fr" id="modal-fr"></div>
    <div class="modal-ar" id="modal-ar"></div>
    <div class="modal-ph" id="modal-ph"></div>
    <div id="modal-theme"></div>
    <div class="modal-nav">
      <button onclick="navModal(-1)">← Préc.</button>
      <button onclick="navModal(1)">Suiv. →</button>
    </div>
  </div>
</div>

<script>
// ─── SVG DRAWERS ───────────────────────────────────────────────────────────────

function couleurSVG(fill, stroke, label) {
  const s = stroke || fill;
  return `<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
    <circle cx="40" cy="36" r="24" fill="${fill}" stroke="${s}" stroke-width="1.5"/>
    <rect x="22" y="60" width="36" height="8" rx="4" fill="${fill}" stroke="${s}" stroke-width="1"/>
  </svg>`;
}

function nombreSVG(n) {
  const dots = [];
  const perRow = n <= 5 ? n : Math.ceil(n / 2);
  const rows = n <= 5 ? 1 : 2;
  const r = 6;
  for (let i = 0; i < n; i++) {
    const row = (rows === 2 && i >= Math.ceil(n / 2)) ? 1 : 0;
    const idx = (rows === 2 && i >= Math.ceil(n / 2)) ? i - Math.ceil(n / 2) : i;
    const rowCount = row === 0 ? Math.ceil(n / 2) : n - Math.ceil(n / 2);
    const totalW = (rowCount - 1) * 16;
    const x = 40 - totalW / 2 + idx * 16;
    const y = rows === 1 ? 44 : (row === 0 ? 36 : 54);
    dots.push(`<circle cx="${x}" cy="${y}" r="${r}" fill="#1D9E75"/>`);
  }
  return `<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
    <text x="40" y="20" text-anchor="middle" font-size="15" fill="#2C2C2A" font-weight="700" font-family="Nunito,sans-serif">${n}</text>
    ${dots.join('')}
  </svg>`;
}

function familleSVG(type) {
  const cfg = {
    papa:      { fill:'#378ADD', female:false, old:false, scale:1.0 },
    maman:     { fill:'#ED93B1', female:true,  old:false, scale:1.0 },

    { fr:'Taa',   ar:'ط', ph:'ṭ (emphatique)',svg: lettreSVG('ط','#1D9E75') },
    { fr:"'Ayn",  ar:'ع', ph:"' (pharyngal)", svg: lettreSVG('ع','#BA7517') },
    { fr:'Laam',  ar:'ل', ph:'l',             svg: lettreSVG('ل','#185FA5') },
    { fr:'Miim',  ar:'م', ph:'m',             svg: lettreSVG('م','#993C1D') },
    { fr:'Waaw',  ar:'و', ph:'w / ū',         svg: lettreSVG('و','#639922') },
    { fr:'Haa',   ar:'ه', ph:'h (glottal)',   svg: lettreSVG('ه','#534AB7') },
  ],
};

// ─── APP ───────────────────────────────────────────────────────────────────────

let currentTheme = 'couleurs';
let currentIdx = 0;

function renderTabs() {
  document.getElementById('tabs').innerHTML = THEMES.map(t =>
    `<button class="tab${t.id===currentTheme?' active':''}" onclick="switchTheme('${t.id}')">${t.icon} ${t.label}</button>`
  ).join('');
}

function renderMain() {
  const items = DATA[currentTheme];
  const theme = THEMES.find(t=>t.id===currentTheme);
  document.getElementById('main').innerHTML = `
    <div class="section active">
      <div class="section-head">
        <h2>${theme.icon} ${theme.label}</h2>
        <p>${items.length} image${items.length>1?'s':''} · cliquez pour agrandir</p>
      </div>
      <div class="grid">
        ${items.map((item,i)=>`
          <div class="card" onclick="openModal(${i})">
            ${item.svg}
            <div class="card-fr">${item.fr}</div>
            <div class="card-ar">${item.ar}</div>
            <div class="card-ph">${item.ph}</div>
          </div>
        `).join('')}
      </div>
    </div>`;
}

function switchTheme(id) {
  currentTheme = id;
  renderTabs();
  renderMain();
  window.scrollTo({top:0, behavior:'smooth'});
}

function openModal(i) {
  currentIdx = i;
  updateModal();
  document.getElementById('modal-bg').classList.add('open');
}

function updateModal() {
  const item = DATA[currentTheme][currentIdx];
  const theme = THEMES.find(t=>t.id===currentTheme);
  const svgEl = document.getElementById('modal-svg');
  svgEl.innerHTML = item.svg;
  const s = svgEl.querySelector('svg');
  if (s) { s.style.width='130px'; s.style.height='130px'; }
  document.getElementById('modal-fr').textContent = item.fr;
  document.getElementById('modal-ar').textContent = item.ar;
  document.getElementById('modal-ph').textContent = item.ph;
  document.getElementById('modal-theme').innerHTML = `<span class="modal-theme">${theme.icon} ${theme.label}</span>`;
}

function navModal(dir) {
  const items = DATA[currentTheme];
  currentIdx = (currentIdx + dir + items.length) % items.length;
  updateModal();
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
}

document.getElementById('modal-bg').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.addEventListener('keydown', function(e) {
  if (!document.getElementById('modal-bg').classList.contains('open')) return;
  if (e.key==='Escape') closeModal();
  if (e.key==='ArrowRight') navModal(1);
  if (e.key==='ArrowLeft') navModal(-1);
});

renderTabs();
renderMain();
</script>
</body>
</html>
